<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Innovation Competency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      min-width: 1024px;
    }

    /* ── LANDING ── */
    #landing {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      width: 100vw;
      height: 100vh;
      gap: 0;
    }

    .tile {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 2rem;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      font-weight: 700;
      color: #ffffff;
      text-align: left;
      line-height: 1.2;
      transition: filter 150ms ease;
    }

    .tile:hover {
      filter: brightness(0.88);
    }

    .tile:active {
      filter: brightness(0.78);
    }

    .tile:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: -4px;
    }

    /* ── DETAIL VIEW ── */
    #detail {
      display: none;
      grid-template-columns: 1fr 2fr;
      width: 100vw;
      height: 100vh;
    }

    #detail.active {
      display: grid;
    }

    /* Left panel */
    #left-panel {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #back-btn {
      flex-shrink: 0;
      height: 3.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0 1.5rem;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      text-align: left;
      transition: filter 150ms ease;
    }

    #back-btn:hover {
      filter: brightness(0.88);
    }

    #back-btn:active {
      filter: brightness(0.78);
    }

    #back-btn:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: -4px;
    }

    #back-btn svg {
      flex-shrink: 0;
    }

    #subtopic-stack {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .subtopic-btn {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.95rem, 1.4vw, 1.2rem);
      font-weight: 600;
      text-align: left;
      line-height: 1.3;
      transition: background 200ms ease, color 200ms ease;
    }

    .subtopic-btn:focus-visible {
      outline: 3px solid rgba(255,255,255,0.7);
      outline-offset: -4px;
    }

    /* Right panel */
    #right-panel {
      background: #ffffff;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #slide-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    #placeholder-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- ── LANDING PAGE ──────────────────────────────────────────────────── -->
<div id="landing" role="main" aria-label="Select a competency"></div>

<!-- ── DETAIL VIEW ──────────────────────────────────────────────────── -->
<div id="detail" role="main" aria-label="Competency detail">
  <div id="left-panel">
    <button id="back-btn" aria-label="Back to competency list">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8L10 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="back-label"></span>
    </button>
    <div id="subtopic-stack" role="list"></div>
  </div>
  <div id="right-panel">
    <iframe id="slide-frame" allowfullscreen="true" title="Slide content"></iframe>
    <div id="placeholder-msg" role="status" aria-live="polite">Slide not yet configured.</div>
  </div>
</div>

<!-- ── APPLICATION LOGIC ─────────────────────────────────────────────── -->
<script>
(function () {
  const landing    = document.getElementById('landing');
  const detail     = document.getElementById('detail');
  const backBtn    = document.getElementById('back-btn');
  const backLabel  = document.getElementById('back-label');
  const subtopicStack = document.getElementById('subtopic-stack');
  const slideFrame = document.getElementById('slide-frame');
  const placeholder = document.getElementById('placeholder-msg');

  let activeCompetency = null;
  let activeSubtopicId = null;

  /* ── Build landing tiles ── */
  COMPETENCIES.forEach(comp => {
    const btn = document.createElement('button');
    btn.className = 'tile';
    btn.style.backgroundColor = comp.color;
    btn.textContent = comp.name;
    btn.setAttribute('aria-label', comp.name);
    btn.addEventListener('click', () => openCompetency(comp));
    btn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openCompetency(comp); }
    });
    landing.appendChild(btn);
  });

  /* ── Darken a hex color by applying brightness(0.85) approximation ── */
  function darkenColor(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    const f = 0.85;
    const dr = Math.round(r * f).toString(16).padStart(2, '0');
    const dg = Math.round(g * f).toString(16).padStart(2, '0');
    const db = Math.round(b * f).toString(16).padStart(2, '0');
    return `#${dr}${dg}${db}`;
  }

  /* ── Open a competency detail view ── */
  function openCompetency(comp) {
    activeCompetency = comp;

    /* Back button */
    backBtn.style.backgroundColor = darkenColor(comp.color);
    backLabel.textContent = comp.name;

    /* Build subtopic buttons */
    subtopicStack.innerHTML = '';
    comp.subtopics.forEach((sub, idx) => {
      const btn = document.createElement('button');
      btn.className = 'subtopic-btn';
      btn.textContent = sub.label;
      btn.setAttribute('role', 'listitem');
      btn.setAttribute('aria-pressed', idx === 0 ? 'true' : 'false');
      btn.dataset.subtopicId = sub.id;

      if (idx === 0) {
        setActiveSubtopic(btn, sub.id, comp);
      } else {
        btn.style.backgroundColor = comp.color;
        btn.style.color = '#ffffff';
      }

      btn.addEventListener('click', () => {
        if (activeSubtopicId === sub.id) return;
        /* Deactivate all */
        subtopicStack.querySelectorAll('.subtopic-btn').forEach(b => {
          b.style.backgroundColor = comp.color;
          b.style.color = '#ffffff';
          b.setAttribute('aria-pressed', 'false');
        });
        setActiveSubtopic(btn, sub.id, comp);
      });

      btn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
      });

      subtopicStack.appendChild(btn);
    });

    /* Switch views */
    landing.style.display = 'none';
    detail.classList.add('active');

    /* Focus management */
    backBtn.focus();
  }

  function setActiveSubtopic(btn, subtopicId, comp) {
    activeSubtopicId = subtopicId;
    btn.style.backgroundColor = '#ffffff';
    btn.style.color = comp.color;
    btn.setAttribute('aria-pressed', 'true');
    loadSlide(comp.id, subtopicId, comp.color);
  }

  /* ── Load slide into iframe ── */
  function loadSlide(compId, subtopicId, color) {
    const url = (SLIDE_URLS[compId] || {})[subtopicId];
    if (!url || url === 'PASTE_EMBED_URL_HERE') {
      slideFrame.style.display = 'none';
      placeholder.style.display = 'flex';
      placeholder.style.color = color;
    } else {
      placeholder.style.display = 'none';
      slideFrame.style.display = 'block';
      slideFrame.src = url;
    }
  }

  /* ── Back button ── */
  backBtn.addEventListener('click', goBack);
  backBtn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goBack(); }
  });

  function goBack() {
    detail.classList.remove('active');
    landing.style.display = '';
    /* Clear iframe to stop any embedded media */
    slideFrame.src = '';
    activeCompetency = null;
    activeSubtopicId = null;
    /* Return focus to the tile that was activated */
    const tiles = landing.querySelectorAll('.tile');
    if (tiles.length) tiles[0].focus();
  }

  /* ── Keyboard: Escape to go back ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && detail.classList.contains('active')) {
      goBack();
    }
  });
})();
</script>

</body>
</html>
